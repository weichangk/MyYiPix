  file-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.unified
      target: file-runtime
    container_name: yipix-file
    restart: always
    ports:
      - "5009:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
    volumes:
      - file_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  # ============================================================
  # Workers
  # ============================================================
  ai-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.unified
      target: aiworker-runtime
    container_name: yipix-ai-worker
    restart: always
    environment:
      - ConnectionStrings__RabbitMQ=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 96M

  webhook-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.unified
      target: webhookworker-runtime
    container_name: yipix-webhook-worker
    restart: always
    environment:
      - ConnectionStrings__RabbitMQ=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 96M

  analytics-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.unified
      target: analyticsworker-runtime
    container_name: yipix-analytics-worker
    restart: always
    environment:
      - ConnectionStrings__RabbitMQ=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 96M

  # ============================================================
  # Nginx Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: yipix-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - auth-service
      - user-service
      - subscription-service
      - payment-service
      - download-service
      - product-service
      - analytics-service
      - task-service
      - file-service
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  file_uploads:
