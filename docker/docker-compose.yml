# ============================================================
# YiPix Development Full-Stack Deployment
# ============================================================
# 使用统一多阶段 Dockerfile，所有服务共享一次 dotnet restore
# 避免 12 个并行构建导致服务器 OOM
#
# 内存规划 (适配 2GB 服务器 + Swap):
#   基础设施: PostgreSQL 256M + Redis 64M + RabbitMQ 256M = 576M
#   微服务 x9: 9 × 128M = 1152M
#   Worker x3: 3 × 96M = 288M
#   总计: ~2.0GB
#
# 使用方式:
#   docker compose -f docker-compose.yml up --build -d
#   或: ./deploy.sh dev (推荐，分批启动)
# ============================================================

services:
  # ============================================================
  # Infrastructure
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: yipix-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yipix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: yipix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: yipix-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================
  # API Services (统一使用 Dockerfile.unified + target)
  # ============================================================
  auth-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.unified
      target: auth-runtime
    container_name: yipix-auth
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=yipix;Username=postgres;Password=postgres
      - ConnectionStrings__RabbitMQ=amqp://guest:guest@rabbitmq:5672
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Secret=YiPix-Super-Secret-Key-Must-Be-At-Least-32-Characters-Long!
      - JwtSettings__Issuer=YiPix
      - JwtSettings__Audience=YiPixClients
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  user-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.unified
      target: user-runtime
    container_name: yipix-user
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=yipix;Username=postgres;Password=postgres
      - ConnectionStrings__RabbitMQ=amqp://guest:guest@rabbitmq:5672
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Secret=YiPix-Super-Secret-Key-Must-Be-At-Least-32-Characters-Long!
      - JwtSettings__Issuer=YiPix
      - JwtSettings__Audience=YiPixClients
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
