    volumes:
      - file_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  # ============================================================
  # Workers
  # ============================================================
  ai-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.unified
      target: aiworker-runtime
    container_name: yipix-ai-worker
    environment:
      - ConnectionStrings__RabbitMQ=amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
